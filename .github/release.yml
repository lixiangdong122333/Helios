changelog:
  exclude:
    labels:
      - "skip-changelog"
      - "dependencies"
    authors:
      - "dependabot[bot]"
  categories:
    - title: "Features"
      labels:
        - "feature"
        - "enhancement"
    - title: "Fixes"
      labels:
        - "fix"
        - "bug"
    - title: "Documentation"
      labels:
        - "documentation"
        - "docs"
    - title: "Maintenance"
      labels:
        - "maintenance"
        - "chore"
    - title: "Other Changes"
      labels:
        - "*"
