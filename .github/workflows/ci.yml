name: CI

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check types
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build

  build-container:
    name: Build container
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build --tag helios:${{ github.sha }} .

  build-sea:
    name: Build SEA (${{ matrix.target }})
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-x64
            runner: windows-2025
          - target: linux-x64-glibc
            runner: ubuntu-24.04
          - target: linux-arm64-glibc
            runner: ubuntu-24.04-arm
          - target: macos-arm64
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build SEA executable
        shell: pwsh
        run: npm run build:sea -- --output-dir release-assets

      - name: Smoke test SEA executable
        shell: pwsh
        run: |
          $Executable = Get-ChildItem -LiteralPath release-assets -Filter helios-cloud-logging-mcp* -Recurse -File |
            Where-Object { $_.Extension -eq ".exe" -or $_.Name -eq "helios-cloud-logging-mcp" } |
            Select-Object -First 1
          if ($null -eq $Executable) { throw "SEA executable was not produced." }
          npm run smoke:sea -- $Executable.FullName
