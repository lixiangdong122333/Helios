name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing SemVer tag to release"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      tag: ${{ steps.release.outputs.tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Resolve release tag
        id: release
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_TAG: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          $ErrorActionPreference = "Stop"
          $Tag = if ($env:EVENT_NAME -eq "workflow_dispatch") { $env:INPUT_TAG } else { $env:EVENT_TAG }
          if ($Tag -notmatch '^v(?:0|[1-9]\d*)\.(?:0|[1-9]\d*)\.(?:0|[1-9]\d*)(?:-(?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*)(?:\.(?:0|[1-9]\d*|\d*[A-Za-z-][0-9A-Za-z-]*))*)?$') {
            throw "Release tag must match vMAJOR.MINOR.PATCH or a SemVer prerelease tag: $Tag"
          }
          "tag=$Tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Validate tag and source commit
        shell: pwsh
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          $ErrorActionPreference = "Stop"
          git fetch origin --force --tags
          if ($LASTEXITCODE -ne 0) { throw "Unable to fetch release tags." }
          git switch --detach $env:TAG
          if ($LASTEXITCODE -ne 0) { throw "Release tag $env:TAG does not exist." }
          git fetch origin main --no-tags
          if ($LASTEXITCODE -ne 0) { throw "Unable to fetch origin/main." }

          $PackageVersion = (node -p "require('./package.json').version").Trim()
          if ($LASTEXITCODE -ne 0) { throw "Unable to read package version." }
          $ExpectedTag = "v$PackageVersion"
          if ($env:TAG -cne $ExpectedTag) {
            throw "Tag $env:TAG does not match package version $ExpectedTag."
          }

          $TagCommit = (git rev-list -n 1 $env:TAG).Trim()
          $MainTip = (git rev-parse origin/main).Trim()
          git merge-base --is-ancestor $TagCommit $MainTip
          if ($LASTEXITCODE -ne 0) {
            throw "Release tag $env:TAG must point to a commit contained in origin/main."
          }

      - name: Install dependencies
        run: npm ci

      - name: Check types
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build

      - name: Create npm package archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          npm pack --pack-destination release-assets
          if ($LASTEXITCODE -ne 0) { throw "Unable to create the npm package archive." }

      - name: Upload release assets
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-package
          path: release-assets/*.tgz
          if-no-files-found: error
          retention-days: 7

  build-sea:
    name: Build SEA (${{ matrix.target }})
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-x64
            runner: windows-2025
          - target: linux-x64-glibc
            runner: ubuntu-24.04
          - target: linux-arm64-glibc
            runner: ubuntu-24.04-arm
          - target: macos-arm64
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build SEA executable
        shell: pwsh
        run: npm run build:sea -- --output-dir release-assets

      - name: Smoke test SEA executable
        shell: pwsh
        run: |
          $Executable = Get-ChildItem -LiteralPath release-assets -Filter helios-cloud-logging-mcp* -Recurse -File |
            Where-Object { $_.Extension -eq ".exe" -or $_.Name -eq "helios-cloud-logging-mcp" } |
            Select-Object -First 1
          if ($null -eq $Executable) { throw "SEA executable was not produced." }
          npm run smoke:sea -- $Executable.FullName

      - name: Package SEA executable
        shell: pwsh
        run: |
          $Executable = Get-ChildItem -LiteralPath release-assets -Filter helios-cloud-logging-mcp* -Recurse -File |
            Where-Object { $_.Extension -eq ".exe" -or $_.Name -eq "helios-cloud-logging-mcp" } |
            Select-Object -First 1
          if ($null -eq $Executable) { throw "SEA executable was not produced." }
          $PackageDirectory = $Executable.Directory
          $ArchiveBase = $PackageDirectory.Name
          if ($IsWindows) {
            $ArchivePath = Join-Path $PackageDirectory.Parent.FullName "$ArchiveBase.zip"
            Compress-Archive -LiteralPath $PackageDirectory.FullName -DestinationPath $ArchivePath -CompressionLevel Optimal
          } else {
            $ArchivePath = Join-Path $PackageDirectory.Parent.FullName "$ArchiveBase.tar.gz"
            tar -czf $ArchivePath -C $PackageDirectory.Parent.FullName $PackageDirectory.Name
            if ($LASTEXITCODE -ne 0) { throw "Unable to create the SEA tarball." }
          }
          Remove-Item -LiteralPath $PackageDirectory.FullName -Recurse -Force
          Get-Item -LiteralPath $ArchivePath | Select-Object FullName,Length

      - name: Upload SEA release asset
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ matrix.target }}
          path: release-assets
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub release
    needs: [verify, build-sea]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Generate release checksums
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $Assets = @(Get-ChildItem -LiteralPath release-assets -File | Sort-Object Name)
          if ($Assets.Count -eq 0) { throw "No release assets were downloaded." }
          $Lines = foreach ($Asset in $Assets) {
            $Hash = (Get-FileHash -LiteralPath $Asset.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$Hash  $($Asset.Name)"
          }
          $ReleaseAssets = (Resolve-Path -LiteralPath release-assets).Path
          $ChecksumPath = Join-Path $ReleaseAssets "SHA256SUMS.txt"
          [System.IO.File]::WriteAllLines($ChecksumPath, [string[]]$Lines, [System.Text.UTF8Encoding]::new($false))
          Get-Content -Encoding UTF8 -LiteralPath $ChecksumPath

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.verify.outputs.tag }}
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $false
          $Assets = @(Get-ChildItem -LiteralPath release-assets -File | Sort-Object Name)
          if ($Assets.Count -eq 0) { throw "No release assets were downloaded." }

          gh release view $env:TAG --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            $UploadArguments = @("release", "upload", $env:TAG, "--repo", $env:GITHUB_REPOSITORY, "--clobber")
            $UploadArguments += $Assets.FullName
            & gh @UploadArguments
            if ($LASTEXITCODE -ne 0) { throw "Unable to update release assets for $env:TAG." }
            exit 0
          }

          $CreateArguments = @(
            "release", "create", $env:TAG,
            "--repo", $env:GITHUB_REPOSITORY,
            "--verify-tag",
            "--generate-notes",
            "--title", "Helios $env:TAG"
          )
          if ($env:TAG.Contains("-")) {
            $CreateArguments += "--prerelease"
          }
          $CreateArguments += $Assets.FullName
          & gh @CreateArguments
          if ($LASTEXITCODE -ne 0) { throw "Unable to create GitHub Release $env:TAG." }
